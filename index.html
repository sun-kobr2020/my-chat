<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Firebase Мессенджер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="room-controls">
        <button id="create-room-btn">Создать приватную комнату</button>
        <button id="share-room-btn" style="display: none;">Скопировать ссылку</button>
        <button id="back-to-general-btn" style="display: none;">В общий чат</button>
    </div>

    <div id="room-info">Комната: <span id="room-name">Загрузка...</span></div>
    <div id="chat-window"><!-- Сообщения --></div>

    <div id="input-area">
        <label for="file-input" class="file-label">📎</label>
        <input type="file" id="file-input" accept="image/*,video/*">

        <input type="text" id="username" placeholder="Имя" style="max-width: 80px;" value="Юзер">
        <input type="text" id="message" placeholder="Сообщение...">
        <button id="send-btn">Отправить</button>
    </div>

    <!-- ✅ Добавили defer - скрипт выполнится после загрузки DOM -->
    <script type="module" src="/app.js" defer></script>
</body>
</html>
