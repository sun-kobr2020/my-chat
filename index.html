<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Firebase Мессенджер</title>
  <script type="module" crossorigin src="/my-chat/assets/index-CZIThAGO.js"></script>
  <link rel="stylesheet" crossorigin href="/my-chat/assets/index-BVZGsHxl.css">
</head>
<body>

    <div id="room-info">Комната: <span id="room-name">Загрузка...</span></div>
    <div id="chat-window"><!-- Сообщения --></div>

    <div id="input-area">
        <label for="file-input" class="file-label">📎</label>
        <input type="file" id="file-input" accept="image/*,video/*">

        <input type="text" id="username" placeholder="Имя" style="max-width: 80px;" value="Юзер">
        <input type="text" id="message" placeholder="Сообщение...">
        <button id="send-btn">Отправить</button>
    </div>

    <!-- ✅ Добавили defer - скрипт выполнится после загрузки DOM -->
</body>
</html>
