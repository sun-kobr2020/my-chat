<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер комнат</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-layout">

    <!-- ЛЕВАЯ ПАНЕЛЬ (САЙДБАР) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button id="create-room-btn">➕ Создать комнату</button>
        </div>

        <div class="rooms-container">
            <h3>Доступные комнаты:</h3>
            <ul id="rooms-list">
                <!-- Сюда JS вставляет комнаты динамически -->
            </ul>
        </div>
    </aside>

    <!-- ПРАВАЯ ПАНЕЛЬ (ЧАТ) -->
    <main class="chat-main">
        <div class="chat-header">
            <h2 id="room-name">Загрузка комнаты...</h2>
            <div class="header-buttons">
                <button id="share-room-btn" style="display: none;">🔗 Ссылка</button>
                <button id="back-to-general-btn" style="display: none;">🔙 В общий чат</button>
            </div>
        </div>

        <!-- Окно отображения сообщений чата -->
        <div id="chat-window"></div>

        <!-- Панель ввода данных и отправки -->
        <div class="input-panel">
            <input type="text" id="username" placeholder="Ваше имя..." value="Юзер">

            <div id="file-preview-zone">
                <!-- Строка: имя файла + крестик -->
                <div class="preview-row">
                    <span id="file-preview-name">📎 Файл: </span>
                    <button id="cancel-file-btn">❌</button>
                </div>
                <!-- Прогресс-бар -->
                <div id="progress-container">
                    <div id="progress-bar"></div>
                    <span id="progress-text">0%</span>
                </div>
            </div>

            <div class="message-row">
                <input type="text" id="message" placeholder="Введите сообщение...">

                <!-- Скрепка для загрузки файлов -->
                <label for="file-input" class="file-label">📎</label>
                <input type="file" id="file-input" accept="image/*,video/*,.pdf,.doc,.docx,.zip,.rar" multiple style="display: none;">

                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </main>

</div>

<!-- Подключение главного скрипта приложения -->
<script type="module" src="/app.js"></script>
</body>
</html>
