<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер комнат</title>
  <script type="module" crossorigin src="/my-chat/assets/index-Dv38q_ah.js"></script>
  <link rel="stylesheet" crossorigin href="/my-chat/assets/index-xmPg5yxn.css">
</head>
<body>

<div class="app-layout">

    <!-- ЛЕВАЯ ПАНЕЛЬ (САЙДБАР) -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <button id="create-room-btn">➕ Создать комнату</button>
        </div>

        <div class="rooms-container">
            <h3>Доступные комнаты:</h3>
            <ul id="rooms-list">
                <!-- Сюда JS вставляет комнаты динамически -->
            </ul>
        </div>
    </aside>

    <!-- ПРАВАЯ ПАНЕЛЬ (ЧАТ) -->
    <main class="chat-main">
        <div class="chat-header">
            <h2 id="room-name">Загрузка комнаты...</h2>
            <div class="header-buttons">
                <button id="share-room-btn" style="display: none;">🔗 Ссылка</button>
                <button id="back-to-general-btn" style="display: none;">🔙 В общий чат</button>
            </div>
        </div>

        <!-- Окно отображения сообщений чата -->
        <div id="chat-window"></div>

        <!-- Панель ввода данных и отправки -->
        <div class="input-panel">
            <input type="text" id="username" placeholder="Ваше имя..." value="Юзер">

            <!-- ВСТАВЛЯЕМ БЛОК ПРЕВЬЮ ФАЙЛА СЮДА -->
            <div id="file-preview-zone" style="display: none; padding: 5px 10px; background: #eef2f3; border-radius: 5px; font-size: 13px; color: #555; margin-bottom: 5px;">
                <span id="file-preview-name">📎 Файл: </span>
                <button id="cancel-file-btn" style="background: none; border: none; color: red; cursor: pointer; font-weight: bold; margin-left: 10px;">❌</button>
            </div>

            <div class="message-row">
                <input type="text" id="message" placeholder="Введите сообщение...">

                <!-- Скрепка для загрузки файлов -->
                <label for="file-input" class="file-label">📎</label>
                <input type="file" id="file-input" style="display: none;" multiple>

                <button id="send-btn">Отправить</button>
            </div>
        </div>
    </main>

</div>

<!-- Подключение главного скрипта приложения -->
</body>
</html>
