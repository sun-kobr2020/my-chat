<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Firebase Мессенджер</title>
  <script type="module" crossorigin src="/my-chat/assets/index-B6sAUPFQ.js"></script>
  <link rel="stylesheet" crossorigin href="/my-chat/assets/index-Bic3sq6E.css">
</head>
<body>
    <div class="app-layout">

        <!-- ЛЕВАЯ ПАНЕЛЬ (САЙДБАР) -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button id="create-room-btn">➕ Создать комнату</button>
            </div>

            <div class="rooms-container">
                <h3>Доступные комнаты:</h3>
                <ul id="rooms-list">
                    <!-- Сюда JS вставляет комнаты -->
                </ul>
            </div>
        </aside>

        <!-- ПРАВАЯ ПАНЕЛЬ (ЧАТ) -->
        <main class="chat-main">
            <div class="chat-header">
                <h2 id="room-name">Комната: general</h2>
                <button id="share-room-btn" style="display: none;">🔗 Ссылка</button>
                <button id="back-to-general-btn" style="display: none;">🔙 В общий чат</button>
            </div>

            <!-- Ваше старое окно чата и инпуты оставляем ниже без изменений -->
            <div id="chat-window"></div>
            <!-- ... блоки ввода сообщений ... -->
        </main>

    </div>

    <div id="input-area">
        <label for="file-input" class="file-label">📎</label>
        <input type="file" id="file-input" accept="image/*,video/*">

        <input type="text" id="username" placeholder="Имя" style="max-width: 80px;" value="Юзер">
        <input type="text" id="message" placeholder="Сообщение...">
        <button id="send-btn">Отправить</button>
    </div>

    <!-- ✅ Добавили defer - скрипт выполнится после загрузки DOM -->
</body>
</html>
